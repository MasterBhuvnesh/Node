name: Build & Push Docker Image - Backend

on:
  push:
    tags:
      - "backend-v*"
    # Uncomment to also trigger on branch pushes:
    # branches:
    #   - "production"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/backend-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/backend-v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/node-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/node-backend:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "Docker image pushed:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/node-backend:latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/node-backend:${{ steps.version.outputs.VERSION }}"
