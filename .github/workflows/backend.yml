name: Build & Push Docker Image - Backend

on:
  push:
    tags:
      - "backend-v*"
    # Uncomment to also trigger on branch pushes:
    # branches:
    #   - "production"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: node_user
          POSTGRES_PASSWORD: node_pass
          POSTGRES_DB: node_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U node_user -d node_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ./backend
        run: bunx prisma generate

      - name: Push schema to test database
        working-directory: ./backend
        run: bunx prisma db push
        env:
          DATABASE_URL: postgresql://node_user:node_pass@localhost:5432/node_db

      - name: Type check
        working-directory: ./backend
        run: bunx tsc --noEmit

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://node_user:node_pass@localhost:5432/node_db
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: test@test.com
          SMTP_PASSWORD: testpass
          EMAIL_FROM: "Test <test@test.com>"
          NODE_ENV: test
        run: bun run test

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/backend-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/backend-v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/node-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/node-backend:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Update Docker Hub description
      #   uses: peter-evans/dockerhub-description@v4
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #     repository: ${{ secrets.DOCKER_USERNAME }}/node-backend
      #     short-description: "Node.js backend API - Express, Prisma, PostgreSQL, JWT auth, Prometheus metrics"
      #     readme-filepath: ./backend/docs/dockerfile-metadata.md

      - name: Print image info
        run: |
          echo "Docker image pushed:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/node-backend:latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/node-backend:${{ steps.version.outputs.VERSION }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name node-app-cluster --region ap-south-1

      - name: Deploy to EKS
        run: |
          kubectl set image deploy/backend \
            backend=${{ secrets.DOCKER_USERNAME }}/node-backend:${{ needs.build.outputs.version }} \
            -n node-app
          kubectl rollout status deploy/backend -n node-app --timeout=120s

      - name: Print deploy info
        run: |
          echo "Deployed to EKS:"
          echo "  - Image: ${{ secrets.DOCKER_USERNAME }}/node-backend:${{ needs.build.outputs.version }}"
          echo "  - Cluster: node-app-cluster (ap-south-1)"
