services:
  postgres:
    image: postgres:16-alpine
    container_name: node_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: node_user
      POSTGRES_PASSWORD: node_pass
      POSTGRES_DB: node_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U node_user -d node_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: node_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
