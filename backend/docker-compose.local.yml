services:
  postgres:
    image: postgres:16-alpine
    container_name: node_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: node_user
      POSTGRES_PASSWORD: node_pass
      POSTGRES_DB: node_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U node_user -d node_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: node_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      LOKI_URL: http://loki:3100
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started

  loki:
    image: grafana/loki:latest
    container_name: node_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  prometheus:
    image: prom/prometheus:latest
    container_name: node_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: node_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  loki_data:
