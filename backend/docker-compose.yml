version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: node_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-node_user}
      POSTGRES_PASSWORD: ${DB_PASS:-node_pass}
      POSTGRES_DB: ${DB_NAME:-node_db}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
