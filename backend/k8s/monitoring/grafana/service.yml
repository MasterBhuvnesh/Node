# NodePort so you can access Grafana from your browser
# Access: http://(minikube ip):30030
# Login: admin / admin
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: node-app
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
