# NodePort so you can access Prometheus UI from your browser
# Access: http://(minikube ip):30090
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: node-app
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
