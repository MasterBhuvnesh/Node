# Prometheus = metrics collection and storage
# WHAT IT DOES: every 15s, it calls GET /metrics on the backend,
# parses the response, and stores time-series data
# WHAT YOU CAN ACCESS: http://(minikube ip):30090
#   → query metrics, see targets, check scrape status
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: node-app
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=15d"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
