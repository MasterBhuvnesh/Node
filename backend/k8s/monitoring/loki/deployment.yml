# Loki = log aggregation system (like Prometheus but for logs)
# WHAT IT DOES: receives logs pushed from the backend via winston-loki,
# indexes them, and makes them queryable in Grafana
# Backend pushes logs to http://loki-svc:3100 (via LOKI_URL env var)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: node-app
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:latest
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}
