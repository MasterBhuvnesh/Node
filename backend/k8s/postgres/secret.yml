# Postgres credentials — kept separate from backend secrets
# echo -n "node_user" | base64 → bm9kZV91c2Vy
# echo -n "node_pass" | base64 → bm9kZV9wYXNz
# echo -n "node_db" | base64   → bm9kZV9kYg==
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: node-app
type: Opaque
data:
  POSTGRES_USER: bm9kZV91c2Vy
  POSTGRES_PASSWORD: bm9kZV9wYXNz
  POSTGRES_DB: bm9kZV9kYg==
