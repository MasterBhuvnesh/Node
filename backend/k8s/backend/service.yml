# Service = stable network endpoint that load-balances across pods
# WHY: pods get random IPs that change on restart — Services give a fixed DNS name
# HOW: any request to backend-svc:3000 gets routed to a healthy pod
#
# Service types:
#   ClusterIP  (default) — only reachable inside the cluster
#   NodePort   — exposes on every node's IP at a static port (30000-32767)
#   LoadBalancer — creates a cloud load balancer (ALB on AWS)
#
# We use NodePort for Minikube (so you can access from your machine)
# In real EKS, you'd use LoadBalancer or Ingress
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: node-app
  labels:
    app: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-south-1:381491923704:certificate/eac16612-65cc-46a8-86f3-13ce79c4dcd4"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - name: https
      port: 443
      targetPort: 3000
      protocol: TCP
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    # Minikube: use minikube service backend-svc -n node-app
    # - name: local
    #   port: 3000
    #   targetPort: 3000
    #   nodePort: 30080
    #   protocol: TCP