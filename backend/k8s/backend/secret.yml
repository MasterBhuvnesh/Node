# Secret = sensitive configuration (passwords, tokens, keys)
# WHY: like ConfigMap but base64-encoded and access-restricted
# K8s can encrypt secrets at rest, and RBAC controls who can read them
# HOW: values must be base64 encoded → echo -n "value" | base64
#
# ⚠️  Replace these placeholder values with your real base64-encoded secrets
# Example: echo -n "mypassword" | base64 → bXlwYXNzd29yZA==
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: node-app
type: Opaque
data:
  # echo -n "postgresql://node_user:node_pass@postgres-svc:5432/node_db" | base64
  DATABASE_URL: cG9zdGdyZXNxbDovL25vZGVfdXNlcjpub2RlX3Bhc3NAcG9zdGdyZXMtc3ZjOjU0MzIvbm9kZV9kYg==
  # echo -n "your-jwt-secret-here" | base64
  JWT_SECRET: eW91ci1qd3Qtc2VjcmV0LWhlcmU=
  # echo -n "your-jwt-refresh-secret-here" | base64
  JWT_REFRESH_SECRET: eW91ci1qd3QtcmVmcmVzaC1zZWNyZXQtaGVyZQ==
  # echo -n "smtp.gmail.com" | base64
  SMTP_HOST: c210cC5nbWFpbC5jb20=
  # echo -n "your-email@gmail.com" | base64
  SMTP_USER: eW91ci1lbWFpbEBnbWFpbC5jb20=
  # echo -n "your-app-password" | base64
  SMTP_PASSWORD: eW91ci1hcHAtcGFzc3dvcmQ=
  # echo -n "Node App <your-email@gmail.com>" | base64
  EMAIL_FROM: Tm9kZSBBcHAgPHlvdXItZW1haWxAZ21haWwuY29tPg==
